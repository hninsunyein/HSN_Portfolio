<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0f"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#13131a"/>
      <stop offset="100%" stop-color="#0e0e14"/>
    </linearGradient>
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111116"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </linearGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97B54" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D97B54" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cmdHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D97B54" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D97B54" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Fine dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#D97B54" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Orange glow center-left -->
  <ellipse cx="420" cy="300" rx="300" ry="200" fill="url(#orangeGlow)" filter="url(#softGlow)"/>

  <!-- ── FILE TREE SIDEBAR ── -->
  <rect x="40" y="72" width="190" height="468" rx="10" fill="url(#sideGrad)" stroke="#1e1e28" stroke-width="1.5"/>
  <!-- sidebar header -->
  <rect x="40" y="72" width="190" height="32" rx="10" fill="#17171f"/>
  <rect x="40" y="92" width="190" height="12" fill="#17171f"/>
  <text x="135" y="92" font-family="monospace" font-size="9" fill="#6b6b80" text-anchor="middle" letter-spacing="1">EXPLORER</text>

  <!-- folder / file tree -->
  <text x="58" y="128" font-family="monospace" font-size="11" fill="#D97B54" opacity="0.9">📁 my-project</text>
  <text x="70" y="148" font-family="monospace" font-size="11" fill="#6b6b80">📁 src</text>
  <text x="84" y="166" font-family="monospace" font-size="11" fill="#8b949e">📄 index.ts</text>
  <text x="84" y="184" font-family="monospace" font-size="11" fill="#D97B54" opacity="0.8">📄 app.ts</text>
  <text x="84" y="202" font-family="monospace" font-size="11" fill="#8b949e">📄 utils.ts</text>
  <text x="70" y="220" font-family="monospace" font-size="11" fill="#6b6b80">📁 components</text>
  <text x="84" y="238" font-family="monospace" font-size="11" fill="#8b949e">📄 Header.tsx</text>
  <text x="84" y="256" font-family="monospace" font-size="11" fill="#8b949e">📄 Footer.tsx</text>
  <text x="70" y="274" font-family="monospace" font-size="11" fill="#6b6b80">📁 tests</text>
  <text x="84" y="292" font-family="monospace" font-size="11" fill="#8b949e">📄 app.test.ts</text>
  <text x="58" y="312" font-family="monospace" font-size="11" fill="#6b6b80">📄 package.json</text>
  <text x="58" y="330" font-family="monospace" font-size="11" fill="#6b6b80">📄 tsconfig.json</text>
  <text x="58" y="348" font-family="monospace" font-size="11" fill="#6b6b80">📄 .gitignore</text>

  <!-- divider -->
  <line x1="58" y1="365" x2="212" y2="365" stroke="#1e1e28" stroke-width="1"/>

  <!-- git status in sidebar -->
  <text x="58" y="384" font-family="monospace" font-size="9" fill="#6b6b80" letter-spacing="1">GIT STATUS</text>
  <text x="58" y="402" font-family="monospace" font-size="10" fill="#34d399" opacity="0.8">M  app.ts</text>
  <text x="58" y="418" font-family="monospace" font-size="10" fill="#fbbf24" opacity="0.8">?  utils.ts</text>
  <text x="58" y="434" font-family="monospace" font-size="10" fill="#34d399" opacity="0.8">M  Header.tsx</text>

  <!-- ── MAIN TERMINAL ── -->
  <rect x="250" y="72" width="720" height="468" rx="10" fill="url(#termGrad)" stroke="#1e1e28" stroke-width="1.5"/>

  <!-- Terminal title bar -->
  <rect x="250" y="72" width="720" height="36" rx="10" fill="#17171f"/>
  <rect x="250" y="96" width="720" height="12" fill="#17171f"/>
  <!-- dots -->
  <circle cx="278" cy="90" r="6" fill="#f87171" opacity="0.75"/>
  <circle cx="298" cy="90" r="6" fill="#fbbf24" opacity="0.75"/>
  <circle cx="318" cy="90" r="6" fill="#34d399" opacity="0.75"/>
  <!-- title -->
  <text x="610" y="94" font-family="'Segoe UI', monospace" font-size="12" fill="#6b6b80" text-anchor="middle">bash  —  my-project</text>

  <!-- Terminal content -->
  <!-- Prompt 1 -->
  <text x="272" y="134" font-family="monospace" font-size="13" fill="#34d399" opacity="0.9">➜</text>
  <text x="292" y="134" font-family="monospace" font-size="13" fill="#8b9eb8"> ~/my-project</text>
  <text x="426" y="134" font-family="monospace" font-size="13" fill="#6b6b80"> git:(main)</text>
  <text x="514" y="134" font-family="monospace" font-size="13" fill="#D97B54" opacity="0.9" filter="url(#textGlow)"> claude</text>

  <!-- Claude response block -->
  <rect x="264" y="145" width="690" height="2" fill="#D97B54" opacity="0.08"/>

  <!-- Claude header -->
  <text x="272" y="170" font-family="'Segoe UI', monospace" font-size="12" fill="#D97B54" opacity="0.6" letter-spacing="1">✦ CLAUDE CODE</text>
  <text x="430" y="170" font-family="monospace" font-size="12" fill="#4b4b5e"> claude-sonnet-4-6</text>

  <!-- Claude messages -->
  <text x="272" y="198" font-family="monospace" font-size="13" fill="#c9d1d9" opacity="0.85">မင်္ဂလာပါ! ဒီ project မှာ ဘာ help လုပ်ပေးရမလဲ?</text>

  <!-- Active command highlight -->
  <rect x="264" y="218" width="690" height="28" rx="4" fill="url(#cmdHighlight)"/>
  <text x="272" y="237" font-family="monospace" font-size="13" fill="#D97B54" opacity="0.5">›</text>
  <text x="288" y="237" font-family="monospace" font-size="13" fill="#c9d1d9" opacity="0.9">app.ts ထဲမှာ authentication bug ကို ရှာပြီး ပြင်ပေးပါ</text>

  <!-- divider -->
  <rect x="264" y="254" width="690" height="1" fill="#1e1e28"/>

  <!-- Claude working -->
  <text x="272" y="278" font-family="monospace" font-size="12" fill="#D97B54" opacity="0.7">✦</text>
  <text x="290" y="278" font-family="monospace" font-size="12" fill="#8b949e"> Reading app.ts...</text>

  <text x="272" y="298" font-family="monospace" font-size="12" fill="#34d399" opacity="0.8">✓</text>
  <text x="290" y="298" font-family="monospace" font-size="12" fill="#8b949e"> Found issue on line 47: JWT token not validated before use</text>

  <text x="272" y="318" font-family="monospace" font-size="12" fill="#D97B54" opacity="0.7">✦</text>
  <text x="290" y="318" font-family="monospace" font-size="12" fill="#8b949e"> Editing app.ts...</text>

  <!-- Edit block -->
  <rect x="272" y="330" width="660" height="95" rx="6" fill="#0d0d12" stroke="#1e1e28" stroke-width="1"/>
  <rect x="272" y="330" width="660" height="20" rx="6" fill="#17171f"/>
  <rect x="272" y="340" width="660" height="10" fill="#17171f"/>
  <text x="452" y="344" font-family="monospace" font-size="9" fill="#4b4b5e" text-anchor="middle">app.ts — edited</text>
  <!-- diff lines -->
  <rect x="272" y="352" width="660" height="16" fill="#f871711a"/>
  <text x="284" y="364" font-family="monospace" font-size="11" fill="#f87171" opacity="0.8">-  const user = jwt.decode(token);</text>
  <rect x="272" y="368" width="660" height="16" fill="#34d3991a"/>
  <text x="284" y="380" font-family="monospace" font-size="11" fill="#34d399" opacity="0.8">+  const user = jwt.verify(token, process.env.JWT_SECRET);</text>
  <rect x="272" y="384" width="660" height="16" fill="#34d3991a"/>
  <text x="284" y="396" font-family="monospace" font-size="11" fill="#34d399" opacity="0.8">+  if (!user) throw new AuthError('Invalid token');</text>
  <text x="284" y="416" font-family="monospace" font-size="11" fill="#4b4b5e" opacity="0.7">  // ... rest of handler</text>

  <text x="272" y="446" font-family="monospace" font-size="12" fill="#34d399" opacity="0.9">✓</text>
  <text x="290" y="446" font-family="monospace" font-size="12" fill="#8b949e"> Fixed! JWT token is now properly verified before use.</text>

  <text x="272" y="466" font-family="monospace" font-size="12" fill="#34d399" opacity="0.7">✓</text>
  <text x="290" y="466" font-family="monospace" font-size="12" fill="#8b949e"> Running tests...</text>

  <text x="272" y="486" font-family="monospace" font-size="12" fill="#34d399" opacity="0.9">✓</text>
  <text x="290" y="486" font-family="monospace" font-size="12" fill="#c9d1d9" opacity="0.8"> All 12 tests passed</text>

  <!-- New prompt (cursor) -->
  <text x="272" y="514" font-family="monospace" font-size="13" fill="#34d399" opacity="0.9">➜</text>
  <text x="292" y="514" font-family="monospace" font-size="13" fill="#8b9eb8"> ~/my-project</text>
  <text x="426" y="514" font-family="monospace" font-size="13" fill="#6b6b80"> git:(main)</text>
  <rect x="514" y="502" width="9" height="16" rx="1" fill="#D97B54" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- ── RIGHT PANEL: Features ── -->
  <rect x="990" y="72" width="170" height="468" rx="10" fill="url(#sideGrad)" stroke="#1e1e28" stroke-width="1.5"/>
  <rect x="990" y="72" width="170" height="32" rx="10" fill="#17171f"/>
  <rect x="990" y="92" width="170" height="12" fill="#17171f"/>
  <text x="1075" y="92" font-family="monospace" font-size="9" fill="#6b6b80" text-anchor="middle" letter-spacing="1">FEATURES</text>

  <!-- Feature items -->
  <g transform="translate(1005, 118)">
    <rect x="0" y="0" width="140" height="46" rx="6" fill="#D97B54" opacity="0.08"/>
    <text x="12" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#D97B54" font-weight="600">🔍 Codebase Read</text>
    <text x="12" y="34" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6b6b80">project ကို နားလည်တယ်</text>
  </g>
  <g transform="translate(1005, 174)">
    <rect x="0" y="0" width="140" height="46" rx="6" fill="#D97B54" opacity="0.08"/>
    <text x="12" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#D97B54" font-weight="600">✏️ Multi-file Edit</text>
    <text x="12" y="34" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6b6b80">file တွေ တပြိုင်နက် ပြင်</text>
  </g>
  <g transform="translate(1005, 230)">
    <rect x="0" y="0" width="140" height="46" rx="6" fill="#34d399" opacity="0.07"/>
    <text x="12" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#34d399" font-weight="600">⚡ Run Commands</text>
    <text x="12" y="34" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6b6b80">test, build, deploy</text>
  </g>
  <g transform="translate(1005, 286)">
    <rect x="0" y="0" width="140" height="46" rx="6" fill="#34d399" opacity="0.07"/>
    <text x="12" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#34d399" font-weight="600">🔀 Git Workflow</text>
    <text x="12" y="34" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6b6b80">commit, PR, merge</text>
  </g>
  <g transform="translate(1005, 342)">
    <rect x="0" y="0" width="140" height="46" rx="6" fill="#8b5cf6" opacity="0.1"/>
    <text x="12" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a78bfa" font-weight="600">🔌 MCP Tools</text>
    <text x="12" y="34" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6b6b80">ပြင်ပ tool ချိတ်ဆက်</text>
  </g>
  <g transform="translate(1005, 398)">
    <rect x="0" y="0" width="140" height="46" rx="6" fill="#8b5cf6" opacity="0.1"/>
    <text x="12" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a78bfa" font-weight="600">🤖 Agentic AI</text>
    <text x="12" y="34" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6b6b80">autonomous decisions</text>
  </g>

  <!-- ── BOTTOM BANNER ── -->
  <rect x="0" y="548" width="1200" height="82" fill="#0d0d12" opacity="0.95"/>
  <line x1="0" y1="548" x2="1200" y2="548" stroke="#D97B54" stroke-width="1" opacity="0.2"/>

  <!-- Anthropic logo circle -->
  <circle cx="72" cy="589" r="22" fill="#D97B54" opacity="0.15"/>
  <text x="72" y="595" font-family="'Segoe UI', sans-serif" font-size="18" fill="#D97B54" text-anchor="middle" font-weight="700">A</text>

  <!-- Text -->
  <text x="108" y="581" font-family="'Segoe UI', Roboto, sans-serif" font-size="26" fill="#ffffff" font-weight="700" opacity="0.95">Claude Code</text>
  <text x="108" y="606" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" fill="#D97B54" letter-spacing="2" opacity="0.7">by Anthropic</text>

  <!-- Divider -->
  <line x1="360" y1="560" x2="360" y2="628" stroke="#1e1e28" stroke-width="1"/>

  <!-- Tagline -->
  <text x="400" y="585" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#c9d1d9" opacity="0.85">Terminal ထဲက သင့်ရဲ့ AI Coding Partner</text>
  <text x="400" y="610" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#6b6b80" letter-spacing="2">READS CODE  ·  EDITS FILES  ·  RUNS TESTS  ·  COMMITS GIT</text>

  <!-- Version badge -->
  <rect x="980" y="570" width="178" height="38" rx="8" fill="#D97B54" opacity="0.12"/>
  <text x="1069" y="585" font-family="monospace" font-size="11" fill="#D97B54" text-anchor="middle" opacity="0.8">$ claude</text>
  <text x="1069" y="601" font-family="monospace" font-size="10" fill="#6b6b80" text-anchor="middle">docs.claude.com</text>
</svg>
