<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#181818"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1f13"/>
      <stop offset="100%" stop-color="#040e09"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2be98d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2be98d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#2be98d" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow behind monitor -->
  <ellipse cx="600" cy="340" rx="320" ry="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Outer ring -->
  <circle cx="600" cy="310" r="280" fill="none" stroke="#2be98d" stroke-width="1" stroke-dasharray="6 14" opacity="0.12"/>
  <circle cx="600" cy="310" r="340" fill="none" stroke="#2be98d" stroke-width="1" stroke-dasharray="2 18" opacity="0.07"/>

  <!-- ── LAPTOP BODY ── -->
  <rect x="370" y="165" width="460" height="285" rx="14" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Screen bezel inner -->
  <rect x="384" y="178" width="432" height="259" rx="9" fill="url(#screenGrad)"/>

  <!-- Screen green glow overlay -->
  <rect x="384" y="178" width="432" height="259" rx="9" fill="#2be98d" opacity="0.03"/>

  <!-- Code lines on screen -->
  <!-- line 1 - keyword + var -->
  <rect x="402" y="200" width="38" height="8" rx="2" fill="#60a5fa" opacity="0.85"/>
  <rect x="448" y="200" width="60" height="8" rx="2" fill="#a78bfa" opacity="0.75"/>
  <rect x="516" y="200" width="20" height="8" rx="2" fill="#d0d0d0" opacity="0.3"/>
  <rect x="544" y="200" width="72" height="8" rx="2" fill="#fbbf24" opacity="0.8"/>

  <!-- line 2 - indent + function -->
  <rect x="418" y="220" width="28" height="8" rx="2" fill="#2be98d" opacity="0.85"/>
  <rect x="454" y="220" width="44" height="8" rx="2" fill="#d0d0d0" opacity="0.25"/>
  <rect x="506" y="220" width="14" height="8" rx="2" fill="#d0d0d0" opacity="0.25"/>
  <rect x="528" y="220" width="56" height="8" rx="2" fill="#f87171" opacity="0.7"/>
  <rect x="592" y="220" width="14" height="8" rx="2" fill="#d0d0d0" opacity="0.25"/>

  <!-- line 3 -->
  <rect x="418" y="240" width="48" height="8" rx="2" fill="#60a5fa" opacity="0.7"/>
  <rect x="474" y="240" width="28" height="8" rx="2" fill="#d0d0d0" opacity="0.2"/>
  <rect x="510" y="240" width="80" height="8" rx="2" fill="#fbbf24" opacity="0.6"/>

  <!-- line 4 - print -->
  <rect x="418" y="260" width="52" height="8" rx="2" fill="#2be98d" opacity="0.9"/>
  <rect x="478" y="260" width="10" height="8" rx="2" fill="#d0d0d0" opacity="0.3"/>
  <rect x="496" y="260" width="96" height="8" rx="2" fill="#a78bfa" opacity="0.75"/>
  <rect x="600" y="260" width="10" height="8" rx="2" fill="#d0d0d0" opacity="0.3"/>

  <!-- line 5 - blank -->
  <rect x="402" y="280" width="20" height="8" rx="2" fill="#d0d0d0" opacity="0.12"/>

  <!-- line 6 -->
  <rect x="402" y="300" width="44" height="8" rx="2" fill="#60a5fa" opacity="0.7"/>
  <rect x="454" y="300" width="30" height="8" rx="2" fill="#d0d0d0" opacity="0.2"/>
  <rect x="492" y="300" width="52" height="8" rx="2" fill="#fbbf24" opacity="0.65"/>
  <rect x="552" y="300" width="64" height="8" rx="2" fill="#d0d0d0" opacity="0.18"/>

  <!-- line 7 -->
  <rect x="418" y="320" width="68" height="8" rx="2" fill="#2be98d" opacity="0.8"/>
  <rect x="494" y="320" width="14" height="8" rx="2" fill="#d0d0d0" opacity="0.2"/>
  <rect x="516" y="320" width="48" height="8" rx="2" fill="#f87171" opacity="0.6"/>

  <!-- cursor blink -->
  <rect x="402" y="342" width="3" height="14" rx="1" fill="#2be98d" opacity="0.9"/>

  <!-- Laptop base -->
  <rect x="330" y="450" width="540" height="18" rx="5" fill="#222222" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="330" y="450" width="540" height="5" rx="2" fill="#2a2a2a"/>
  <!-- Hinge notch -->
  <rect x="555" y="448" width="90" height="4" rx="2" fill="#1a1a1a"/>

  <!-- ── FLOATING COLORFUL BLOCKS (Scratch-style) ── -->
  <!-- Block 1 - top left -->
  <rect x="88" y="120" width="140" height="38" rx="8" fill="#60a5fa" opacity="0.92"/>
  <rect x="88" y="120" width="140" height="10" rx="8" fill="#93c5fd" opacity="0.4"/>
  <text x="158" y="145" font-family="monospace" font-size="14" fill="white" text-anchor="middle" opacity="0.95">if age &gt;= 5:</text>

  <!-- Block 2 - left mid -->
  <rect x="60" y="220" width="160" height="38" rx="8" fill="#a78bfa" opacity="0.9"/>
  <rect x="60" y="220" width="160" height="10" rx="8" fill="#c4b5fd" opacity="0.4"/>
  <text x="140" y="245" font-family="monospace" font-size="13" fill="white" text-anchor="middle" opacity="0.95">learn("Scratch")</text>

  <!-- Block 3 - bottom left -->
  <rect x="78" y="340" width="150" height="38" rx="8" fill="#2be98d" opacity="0.85"/>
  <rect x="78" y="340" width="150" height="10" rx="8" fill="#6ee7b7" opacity="0.4"/>
  <text x="153" y="365" font-family="monospace" font-size="13" fill="#0d0d0d" text-anchor="middle" font-weight="bold">problem.solve()</text>

  <!-- Block 4 - top right -->
  <rect x="970" y="110" width="148" height="38" rx="8" fill="#fbbf24" opacity="0.9"/>
  <rect x="970" y="110" width="148" height="10" rx="8" fill="#fde68a" opacity="0.4"/>
  <text x="1044" y="135" font-family="monospace" font-size="13" fill="#0d0d0d" text-anchor="middle" font-weight="bold">print("Hello!")</text>

  <!-- Block 5 - right mid -->
  <rect x="990" y="220" width="140" height="38" rx="8" fill="#f87171" opacity="0.88"/>
  <rect x="990" y="220" width="140" height="10" rx="8" fill="#fca5a5" opacity="0.4"/>
  <text x="1060" y="245" font-family="monospace" font-size="13" fill="white" text-anchor="middle">for kid in kids:</text>

  <!-- Block 6 - bottom right -->
  <rect x="980" y="340" width="148" height="38" rx="8" fill="#34d399" opacity="0.85"/>
  <rect x="980" y="340" width="148" height="10" rx="8" fill="#6ee7b7" opacity="0.4"/>
  <text x="1054" y="365" font-family="monospace" font-size="13" fill="#0d0d0d" text-anchor="middle" font-weight="bold">create(game)</text>

  <!-- ── FLOATING SYMBOLS ── -->
  <!-- </> left side -->
  <text x="172" y="430" font-family="monospace" font-size="36" fill="#2be98d" opacity="0.22" font-weight="bold">&lt;/&gt;</text>
  <!-- {} right side -->
  <text x="1010" y="430" font-family="monospace" font-size="36" fill="#a78bfa" opacity="0.22" font-weight="bold">{}</text>
  <!-- () top center-left -->
  <text x="240" y="90" font-family="monospace" font-size="28" fill="#fbbf24" opacity="0.18" font-weight="bold">()</text>
  <!-- # top center-right -->
  <text x="930" y="88" font-family="monospace" font-size="28" fill="#60a5fa" opacity="0.18" font-weight="bold">#</text>

  <!-- ── LIGHTBULB (top center) ── -->
  <g transform="translate(570, 48)">
    <!-- bulb body -->
    <circle cx="30" cy="28" r="18" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.7"/>
    <path d="M 20 40 Q 20 50 30 50 Q 40 50 40 40" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.7"/>
    <line x1="22" y1="52" x2="38" y2="52" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
    <line x1="24" y1="56" x2="36" y2="56" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
    <!-- inner glow lines -->
    <line x1="30" y1="20" x2="30" y2="14" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
    <line x1="38" y1="22" x2="42" y2="18" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
    <line x1="22" y1="22" x2="18" y2="18" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
    <!-- inner code symbol -->
    <text x="30" y="33" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle" opacity="0.85">&lt;/&gt;</text>
  </g>

  <!-- ── CONNECTING DOTS (left side) ── -->
  <circle cx="240" cy="175" r="3" fill="#2be98d" opacity="0.3"/>
  <circle cx="260" cy="205" r="2" fill="#60a5fa" opacity="0.25"/>
  <circle cx="230" cy="295" r="3" fill="#a78bfa" opacity="0.3"/>
  <circle cx="255" cy="395" r="2" fill="#2be98d" opacity="0.2"/>

  <!-- connecting dots (right side) -->
  <circle cx="960" cy="170" r="3" fill="#fbbf24" opacity="0.3"/>
  <circle cx="940" cy="210" r="2" fill="#f87171" opacity="0.25"/>
  <circle cx="962" cy="300" r="3" fill="#34d399" opacity="0.3"/>
  <circle cx="945" cy="390" r="2" fill="#60a5fa" opacity="0.2"/>

  <!-- ── BOTTOM TEXT ── -->
  <text x="600" y="530" font-family="'Segoe UI', sans-serif" font-size="32" fill="#d0d0d0" text-anchor="middle" font-weight="700" letter-spacing="1" opacity="0.9">Coding is the New Literacy</text>
  <text x="600" y="568" font-family="'Segoe UI', sans-serif" font-size="16" fill="#2be98d" text-anchor="middle" letter-spacing="3" opacity="0.75">EDUCATION  ·  KIDS  ·  FUTURE SKILLS</text>

  <!-- bottom accent line -->
  <line x1="480" y1="582" x2="720" y2="582" stroke="#2be98d" stroke-width="1.5" opacity="0.35"/>
</svg>
