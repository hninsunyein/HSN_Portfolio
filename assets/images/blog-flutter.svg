  <!-- Code text -->
  <text x="88" y="140" font-family="monospace" font-size="13" fill="#56cce8">import </text>
  <text x="143" y="140" font-family="monospace" font-size="13" fill="#f7c948">'package:flutter/material.dart'</text>
  <text x="382" y="140" font-family="monospace" font-size="13" fill="#c9d1d9">;</text>

  <text x="88" y="176" font-family="monospace" font-size="13" fill="#79c0ff">void </text>
  <text x="127" y="176" font-family="monospace" font-size="13" fill="#d2a8ff">main</text>
  <text x="163" y="176" font-family="monospace" font-size="13" fill="#c9d1d9">() {'{}'}</text>

  <text x="88" y="194" font-family="monospace" font-size="13" fill="#c9d1d9">  </text>
  <text x="100" y="194" font-family="monospace" font-size="13" fill="#d2a8ff">runApp</text>
  <text x="149" y="194" font-family="monospace" font-size="13" fill="#c9d1d9">(</text>
  <text x="157" y="194" font-family="monospace" font-size="13" fill="#79c0ff">MyApp</text>
  <text x="202" y="194" font-family="monospace" font-size="13" fill="#c9d1d9">());</text>

  <text x="88" y="212" font-family="monospace" font-size="13" fill="#c9d1d9">{'}'}</text>

  <text x="88" y="248" font-family="monospace" font-size="13" fill="#79c0ff">class </text>
  <text x="133" y="248" font-family="monospace" font-size="13" fill="#56cce8">MyApp </text>
  <text x="185" y="248" font-family="monospace" font-size="13" fill="#79c0ff">extends </text>
  <text x="250" y="248" font-family="monospace" font-size="13" fill="#56cce8">StatelessWidget </text>
  <text x="384" y="248" font-family="monospace" font-size="13" fill="#c9d1d9">{'{'}</text>

  <text x="88" y="266" font-family="monospace" font-size="13" fill="#c9d1d9">  </text>
  <text x="100" y="266" font-family="monospace" font-size="13" fill="#56cce8">Widget </text>
  <text x="152" y="266" font-family="monospace" font-size="13" fill="#d2a8ff">build</text>
  <text x="188" y="266" font-family="monospace" font-size="13" fill="#c9d1d9">(BuildContext ctx) {'{'}</text>

  <text x="88" y="284" font-family="monospace" font-size="13" fill="#79c0ff">    return </text>
  <text x="155" y="284" font-family="monospace" font-size="13" fill="#56cce8">MaterialApp</text>
  <text x="258" y="284" font-family="monospace" font-size="13" fill="#c9d1d9">(</text>

  <text x="88" y="302" font-family="monospace" font-size="13" fill="#c9d1d9">      home: </text>
  <text x="165" y="302" font-family="monospace" font-size="13" fill="#56cce8">Scaffold</text>
  <text x="224" y="302" font-family="monospace" font-size="13" fill="#c9d1d9">(</text>

  <text x="88" y="320" font-family="monospace" font-size="13" fill="#c9d1d9">        appBar: </text>
  <text x="178" y="320" font-family="monospace" font-size="13" fill="#56cce8">AppBar</text>
  <text x="225" y="320" font-family="monospace" font-size="13" fill="#c9d1d9">(</text>

  <text x="88" y="338" font-family="monospace" font-size="13" fill="#c9d1d9">          title: </text>
  <text x="182" y="338" font-family="monospace" font-size="13" fill="#56cce8">Text</text>
  <text x="213" y="338" font-family="monospace" font-size="13" fill="#c9d1d9">(</text>
  <text x="221" y="338" font-family="monospace" font-size="13" fill="#f7c948">'မင်္ဂလာပါ Flutter'</text>
  <text x="388" y="338" font-family="monospace" font-size="13" fill="#c9d1d9">)),</text>

  <text x="88" y="356" font-family="monospace" font-size="13" fill="#c9d1d9">        body: </text>
  <text x="162" y="356" font-family="monospace" font-size="13" fill="#56cce8">Center</text>
  <text x="208" y="356" font-family="monospace" font-size="13" fill="#c9d1d9">(child:</text>

  <text x="88" y="374" font-family="monospace" font-size="13" fill="#c9d1d9">          </text>
  <text x="165" y="374" font-family="monospace" font-size="13" fill="#56cce8">Text</text>
  <text x="196" y="374" font-family="monospace" font-size="13" fill="#c9d1d9">(</text>
  <text x="204" y="374" font-family="monospace" font-size="13" fill="#f7c948">'Hello World!'</text>
  <text x="342" y="374" font-family="monospace" font-size="13" fill="#c9d1d9">,</text>

  <text x="88" y="392" font-family="monospace" font-size="13" fill="#c9d1d9">            style: </text>
  <text x="196" y="392" font-family="monospace" font-size="13" fill="#56cce8">TextStyle</text>
  <text x="263" y="392" font-family="monospace" font-size="13" fill="#c9d1d9">(</text>

  <text x="88" y="410" font-family="monospace" font-size="13" fill="#c9d1d9">              fontSize: </text>
  <text x="230" y="410" font-family="monospace" font-size="13" fill="#79c0ff">24</text>
  <text x="246" y="410" font-family="monospace" font-size="13" fill="#c9d1d9">, color: </text>
  <text x="312" y="410" font-family="monospace" font-size="13" fill="#56cce8">Colors</text>
  <text x="358" y="410" font-family="monospace" font-size="13" fill="#c9d1d9">.blue,</text>

  <text x="88" y="428" font-family="monospace" font-size="13" fill="#c9d1d9">            )))),</text>

  <text x="88" y="446" font-family="monospace" font-size="13" fill="#c9d1d9">    );</text>

  <text x="88" y="464" font-family="monospace" font-size="13" fill="#c9d1d9">  {'}'}</text>

  <text x="88" y="482" font-family="monospace" font-size="13" fill="#c9d1d9">{'}'}</text>

